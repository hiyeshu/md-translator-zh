name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run compile

      - run: mkdir -p dist && npx @vscode/vsce package --out dist/ --no-dependencies

      - run: npx ovsx publish dist/*.vsix -p ${{ secrets.OVSX_TOKEN }}
        continue-on-error: true

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.vsix
          generate_release_notes: true
